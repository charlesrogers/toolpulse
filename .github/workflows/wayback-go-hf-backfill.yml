name: Wayback go.hf Backfill

on:
  schedule:
    # Run 2x daily — separate from product page backfill
    - cron: '17 5,17 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of URLs to backfill per run'
        required: false
        default: '20'

permissions:
  contents: write
  actions: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Restore database
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          name: toolpulse-db
          path: data/
          if_no_artifact_found: warn
          search_artifacts: true
          workflow: daily-scrape.yml

      - name: Restore go.hf backfill progress
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          name: go-hf-backfill-progress
          path: data/
          if_no_artifact_found: warn
          search_artifacts: true
          workflow: wayback-go-hf-backfill.yml

      - name: Run go.hf Wayback backfill
        env:
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '20' }}
        run: python3 scrapers/wayback_go_hf.py --db --batch-size $BATCH_SIZE

      - name: Show database stats
        run: python3 db.py

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: toolpulse-db
          path: data/toolpulse.db
          retention-days: 90
          overwrite: true

      - name: Upload go.hf backfill progress
        uses: actions/upload-artifact@v4
        with:
          name: go-hf-backfill-progress
          path: data/go_hf_backfill_progress.json
          retention-days: 90
          overwrite: true
