name: Deploy Viewer to GitHub Pages

on:
  workflow_run:
    workflows:
      - "Wayback Backfill"
      - "Wayback go.hf Backfill"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore database from artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: toolpulse-db
          path: data/
          if_no_artifact_found: warn
          search_artifacts: true
          workflow: wayback-backfill.yml
          workflow_conclusion: ''

      - name: Generate viewer.html
        run: python3 generate_viewer.py

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-deploy
          git rm -rf .
          cp viewer.html index.html
          git add index.html
          git commit -m "Update viewer $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages-deploy:gh-pages --force
